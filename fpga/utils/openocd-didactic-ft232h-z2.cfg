# OpenOCD configuration for the local PYNQ-Z2 + FT232H setup.
#
# The PYNQ-Z2 built-in USB-JTAG is used only to program the FPGA bitstream.
# This file targets the Didactic SoC fabric JTAG exposed on the PYNQ-Z2
# general IO headers and driven by an external single-channel FT232H MPSSE
# adapter.

adapter driver ftdi

# Most FT232H breakout boards enumerate as FTDI VID 0x0403, PID 0x6014.
ftdi vid_pid 0x0403 0x6014
ftdi channel 0

# Standard FTDI MPSSE JTAG layout.
# On the CJMCU-232H-style module these pins are silk-screened AD0..AD7:
# AD0/ADBUS0 = TCK, AD1/ADBUS1 = TDI, AD2/ADBUS2 = TDO,
# AD3/ADBUS3 = TMS. AD7/ADBUS7 is configured as output high and is
# wired to jtag_trst_n.
ftdi layout_init 0x0088 0x008b

transport select jtag
adapter speed 1000

# Custom port settings
gdb_port 3333
tcl_port disabled
telnet_port disabled

# Target configuration
reset_config none

set _CHIPNAME riscv

jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x1c0ffee1 -ignore-version

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

gdb_report_data_abort enable
gdb_report_register_access_error enable

riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120

scan_chain
targets

init
halt
echo "Ready for Remote Connections"
